<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Kaimon Slate</title>
<script src="/assets/js/platform.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23569cd6'/><text x='50' y='73' font-size='62' text-anchor='middle' fill='%23ffffff' font-family='monospace'>S</text></svg>"/>
<style>html{background:#0d1120;color-scheme:dark;}
body{background:#0d1120;color:#d4d8e8;font-family:system-ui,sans-serif;margin:0;padding:40px;min-height:100vh;box-sizing:border-box;}
h1{color:#fff;font-size:1.3rem;} .empty{color:#6a7090;}
.nb{display:flex;align-items:center;gap:12px;padding:11px 14px;margin:8px 0;background:#141828;
    border:1px solid #2a2e40;border-left:3px solid #569cd6;border-radius:8px;}
.nb:hover{border-color:#569cd6;} .nb.has-err{border-left-color:#e57575;}
.nbmain{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;text-decoration:none;color:inherit;}
.nbhead{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.nb .t{color:#fff;font-weight:600;} .nb .p{color:#6a7090;font-family:Menlo,monospace;font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wport{font-size:.72rem;color:#56d364;font-family:Menlo,monospace;white-space:nowrap;flex:0 0 auto;}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px;}
.bdg{font-size:.7rem;padding:2px 7px;border-radius:999px;background:#1a1f30;border:1px solid #262b40;color:#9aa3c0;line-height:1.3;}
.bdg.stale{color:#e3b341;border-color:#5a4a1e;background:rgba(227,179,65,.08);}
.bdg.err{color:#e57575;border-color:#5a2530;background:rgba(229,117,117,.1);}
.bdg.run{color:#56d364;border-color:#1e5a2e;background:rgba(86,211,100,.1);}
.bdg.ctrl{color:#4ec9b0;border-color:#1e5048;background:rgba(78,201,176,.08);}
.foot{color:#5a6080;font-size:.7rem;margin-top:5px;font-family:Menlo,monospace;}
.sect{color:#8a90b0;font-size:.78rem;font-weight:600;margin:2px 0 8px;text-transform:uppercase;letter-spacing:.05em;}
.recent{min-width:0;}
.ritem{display:flex;align-items:center;gap:10px;padding:7px 12px;margin:5px 0;background:#10131f;border:1px solid #21253a;border-radius:7px;cursor:pointer;}
.ritem:hover{border-color:#569cd6;}
.ritem .rt{flex:1;min-width:0;display:flex;flex-direction:column;}
.ritem .rb{color:#cdd3e6;font-size:.85rem;}
.ritem .rp{color:#6a7090;font-family:Menlo,monospace;font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ritem .rx{background:none;border:none;color:#6a7090;cursor:pointer;font-size:.95rem;padding:2px 6px;border-radius:5px;line-height:1;}
.ritem .rx:hover{color:#e57575;background:rgba(229,117,117,.1);}
.ritem.isopen{border-left:2px solid #56d364;} .rdot{color:#56d364;font-size:.6rem;vertical-align:middle;margin-left:5px;}
.nb .kill{background:#141828;color:#e57575;border:1px solid #3a2030;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:.78rem;white-space:nowrap;}
.nb .kill:hover{border-color:#e57575;background:rgba(229,117,117,.1);}
.cols{display:grid;grid-template-columns:minmax(340px,1fr) minmax(360px,1.05fr);gap:36px;align-items:start;max-width:1160px;margin:6px 0 8px;}
@media(max-width:840px){.cols{grid-template-columns:1fr;gap:26px;}}
.colL,.colR{min-width:0;}
.open{display:flex;gap:8px;margin-bottom:24px;}
.empty{margin-top:2px;}
.pathwrap{position:relative;flex:1;}
.pathwrap input{width:100%;background:#141828;color:#d4d8e8;border:1px solid #2a2e40;border-radius:8px;padding:8px 12px;font-family:Menlo,monospace;font-size:.85rem;}
.pathwrap input:focus{outline:none;border-color:#569cd6;}
.comp{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:5;list-style:none;margin:0;padding:4px;
  background:#141828;border:1px solid #2a2e40;border-radius:8px;max-height:min(56vh,440px);overflow:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.comp li{padding:4px 10px;border-radius:5px;cursor:pointer;font-family:Menlo,monospace;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.comp li.on{background:#569cd6;color:#0d1120;} .comp li:hover{background:#1a1e2e;}
.comp li.more{color:#6a7090;cursor:default;font-style:italic;font-size:.76rem;}
.comp li.more:hover{background:none;}
.open button{background:#141828;color:#d4d8e8;border:1px solid #2a2e40;border-radius:8px;padding:8px 16px;cursor:pointer;}
.open button:hover{border-color:#569cd6;color:#569cd6;}
.modal-bg{position:fixed;inset:0;background:rgba(5,8,16,.66);display:none;align-items:center;justify-content:center;z-index:50;}
.modal-bg.show{display:flex;}
.modal{background:#141828;border:1px solid #2a2e40;border-radius:10px;padding:18px 20px;max-width:520px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.55);}
.modal .msg{color:#d4d8e8;font-size:.92rem;line-height:1.5;margin-bottom:16px;white-space:pre-wrap;word-break:break-word;}
.modal .row{display:flex;justify-content:flex-end;gap:10px;}
.modal button{background:#1a1e2e;color:#d4d8e8;border:1px solid #2a2e40;border-radius:7px;padding:7px 16px;cursor:pointer;font-size:.85rem;}
.modal button:hover{border-color:#569cd6;color:#569cd6;}
.modal button.primary{background:#569cd6;color:#0d1120;border-color:#569cd6;font-weight:600;}
.modal button.primary:hover{background:#6cb0e6;color:#0d1120;}
.modal button.danger{color:#e57575;border-color:#3a2030;} .modal button.danger:hover{background:rgba(229,117,117,.12);border-color:#e57575;color:#e57575;}
.loading{position:fixed;inset:0;background:rgba(5,8,16,.72);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:60;}
.loading.show{display:flex;}
.spinner{width:38px;height:38px;border:3px solid #2a2e40;border-top-color:#569cd6;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading .lmsg{color:#d4d8e8;font-size:.9rem;}
.importmodal{max-width:640px;}
.imrow{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.imrow label{color:#8a90b0;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;}
.impath{font-family:Menlo,monospace;font-size:.8rem;color:#cdd3e6;word-break:break-all;}
.imrow input{background:#10131f;color:#d4d8e8;border:1px solid #2a2e40;border-radius:7px;padding:7px 10px;font-family:Menlo,monospace;font-size:.82rem;}
.imrow input:focus{outline:none;border-color:#569cd6;}
.imlog{background:#0d1120;border:1px solid #21253a;border-radius:7px;margin:0 0 12px;padding:8px 10px;max-height:280px;overflow:auto;font-family:Menlo,monospace;font-size:.74rem;line-height:1.4;color:#9aa3c0;white-space:pre-wrap;word-break:break-word;}
.imstatus{color:#7cc0ff;font-size:.82rem;margin-bottom:12px;min-height:1.1em;}
.imstatus.err{color:#e57575;white-space:pre-wrap;}
.hero{display:flex;align-items:center;gap:16px;margin:0 0 22px;}
.hero .logo{width:50px;height:50px;flex:0 0 auto;filter:drop-shadow(0 2px 10px rgba(86,156,214,.25));}
.hero h1{font-size:1.6rem;margin:0;line-height:1.1;font-weight:700;letter-spacing:-.01em;
  background:linear-gradient(90deg,#7cc0ff 10%,#c586c0 55%,#56d364 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero .tag{color:#7a82a4;font-size:.84rem;margin-top:3px;}
.nb,.ritem{transition:border-color .14s,transform .14s,box-shadow .14s;}
.nb:hover,.ritem:hover{transform:translateX(2px);box-shadow:0 4px 18px rgba(0,0,0,.28);}
/* Featured "Sites" strip (published local sites), full-width under the header. Collapses when empty. */
.sitesband{max-width:1160px;margin:0 0 26px;}.sitesband:empty{display:none;}
.sitecards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.sitecard{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;column-gap:10px;align-items:center;
  background:#141828;border:1px solid #2a2e40;border-radius:11px;padding:12px 15px;text-decoration:none;
  transition:border-color .14s,transform .14s,box-shadow .14s;}
.sitecard:hover{border-color:#569cd6;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.sitecard .si{grid-row:1/3;font-size:1.35rem;opacity:.9;}
.sitecard .sn{color:#e6ebf7;font-weight:600;font-size:.96rem;}
.sitecard .su{color:#6a7090;font-size:.73rem;font-family:Menlo,monospace;}</style></head>
<body>
<div class="hero">
  <svg class="logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <rect x="2.5" y="2.5" width="43" height="43" rx="12" fill="#141828" stroke="#2a2e40" stroke-width="1.5"/>
    <path d="M16 15 L33 20 M33 20 L22 34 M16 15 L22 34" stroke="#566089" stroke-width="2" stroke-linecap="round"/>
    <circle cx="16" cy="15" r="4" fill="#7cc0ff"/>
    <circle cx="33" cy="20" r="4" fill="#c586c0"/>
    <circle cx="22" cy="34" r="4" fill="#56d364"/>
  </svg>
  <div><h1>Kaimon Slate</h1><div class="tag">reactive Julia notebooks · live · agent-assisted</div></div>
</div>
<div id="localsites" class="sitesband"></div>
<div id="published" class="sitesband"></div>
<div class="cols">
<div class="colL">
  <div class="open">
    <div class="pathwrap">
      <input id="pathin" autocomplete="off" spellcheck="false"
             placeholder="~/path/to/notebook.jl — Tab to complete, Enter to open"/>
      <ul id="comp" class="comp"></ul>
    </div>
    <button id="openbtn">Open</button>
    <button id="uploadbtn" title="Upload a .jl from this computer and open it">⬆ Upload</button>
    <input type="file" id="uploadin" accept=".jl" style="display:none"/>
  </div>
  <div id="recent" class="recent"></div>
</div>
<div class="colR"><div id="sessions"></div></div>
</div>
<div class="modal-bg" id="modalbg"><div class="modal"><div class="msg" id="modalmsg"></div><div class="row" id="modalrow"></div></div></div>
<div class="loading" id="loading"><div class="spinner"></div><div class="lmsg" id="lmsg"></div></div>
<div class="modal-bg" id="importbg"><div class="modal importmodal">
  <div class="msg"><strong>Self-contained notebook</strong> <span style="color:#7a82a4;font-weight:400">— run it now (temporary), or import into a project you own</span></div>
  <div class="imrow"><label>Source</label><span id="imsrc" class="impath"></span></div>
  <div class="imrow"><label>Import to (new project directory)</label><input id="imtarget" spellcheck="false" autocomplete="off"/></div>
  <pre id="imlog" class="imlog" style="display:none"></pre>
  <div class="imstatus" id="imstatus"></div>
  <div class="row"><button id="imcancel">Cancel</button><button id="imimport">📦 Import</button><button id="imrun" class="primary">▶ Run (temporary)</button></div>
</div></div>
<script>
(function(){
  var inp=document.getElementById('pathin'), comp=document.getElementById('comp'), items=[], sel=-1, moreTrunc=false;
  var modalBg=document.getElementById('modalbg'), modalMsg=document.getElementById('modalmsg'),
      modalRow=document.getElementById('modalrow'), loadEl=document.getElementById('loading'),
      loadMsg=document.getElementById('lmsg'), _resolve=null;
  var esc=function(s){return s.replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
  var isdir=function(p){return window.PLATFORM.isDirPath(p);};   // ends in / or \
  // Dark-themed modal (returns a Promise) replacing native confirm/alert.
  function _close(v){if(_resolve){var r=_resolve;_resolve=null;modalBg.classList.remove('show');r(v);}}
  function modal(message,buttons){return new Promise(function(resolve){_resolve=resolve;
    modalMsg.textContent=message;modalRow.innerHTML='';
    buttons.forEach(function(b){var el=document.createElement('button');el.textContent=b.label;if(b.cls)el.className=b.cls;
      el.onclick=function(){_close(b.value);};modalRow.appendChild(el);});
    modalBg.classList.add('show');var pr=modalRow.querySelector('.primary')||modalRow.lastChild;if(pr)pr.focus();});}
  function confirmDark(msg,okLabel,okCls){return modal(msg,[{label:'Cancel',value:false},{label:okLabel||'OK',value:true,cls:okCls||'primary'}]);}
  function alertDark(msg){return modal(msg,[{label:'OK',value:true,cls:'primary'}]);}
  modalBg.addEventListener('mousedown',function(e){if(e.target===modalBg)_close(false);});
  document.addEventListener('keydown',function(e){if(modalBg.classList.contains('show')&&e.key==='Escape')_close(false);});
  function showLoading(m){loadMsg.textContent=m||'Working…';loadEl.classList.add('show');}
  function hideLoading(){loadEl.classList.remove('show');}
  function openPath(p){p=(p||'').trim();if(!p)return;
    try{localStorage.setItem('slateLastDir', window.PLATFORM.dirOf(p));}catch(e){}   // remember the directory
    showLoading('Opening “'+p+'” — starting the worker…');
    fetch('/api/open',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:p})})
      .then(function(r){return r.ok?r.json():r.text().then(function(t){return Promise.reject(t);});})
      .then(function(d){pushRecent(d.path||p);location.href=d.url;}).catch(function(e){hideLoading();alertDark('Open failed: '+e);});}
  // ── Import a self-contained .jl (one carrying a Slate.bundle footer) ─────────
  var importBg=document.getElementById('importbg'),imSrc=document.getElementById('imsrc'),
      imTarget=document.getElementById('imtarget'),imLog=document.getElementById('imlog'),
      imStatus=document.getElementById('imstatus'),imRun=document.getElementById('imrun'),
      imImport=document.getElementById('imimport'),imCancel=document.getElementById('imcancel'),
      _imPath='',_imES=null,_imDone=false;
  function _defTarget(p){var dir=window.PLATFORM.dirOf(p);               // dir incl. trailing sep
    var name=baseName(p).replace(/\.jl$/i,'').replace(/\.standalone$/i,'');
    return dir+(name||'imported')+window.PLATFORM.sep;}
  // Open a file — but if it's a self-contained bundle, launch the run/import helper instead.
  function openMaybeStandalone(p){
    fetch('/api/path-info?q='+encodeURIComponent(p)).then(function(r){return r.json();})
      .then(function(info){info.standalone?openImport(p):openPath(p);})
      .catch(function(){openPath(p);});}
  function _imBusy(b){imRun.disabled=b;imImport.disabled=b;}
  function openImport(p){_imPath=p;_imDone=false;imSrc.textContent=p;imTarget.value=_defTarget(p);
    imLog.style.display='none';imLog.textContent='';imStatus.textContent='';imStatus.className='imstatus';
    _imBusy(false);imCancel.textContent='Cancel';importBg.classList.add('show');}
  function closeImport(){if(_imES){_imES.close();_imES=null;}importBg.classList.remove('show');}
  function _imLine(s){imLog.style.display='block';imLog.textContent+=s+'\n';imLog.scrollTop=imLog.scrollHeight;}
  // Import → expand into the target dir (streamed). Run is a plain open (below): the notebook
  // reconstructs + runs its env in the background, showing the embedded preview meanwhile.
  function startImport(){
    _imDone=false;_imBusy(true);imStatus.className='imstatus';imStatus.textContent='Importing…';
    var url='/api/import-standalone?path='+encodeURIComponent(_imPath)+'&target='+encodeURIComponent(imTarget.value.trim());
    var es=new EventSource(url);_imES=es;
    es.addEventListener('status',function(e){imStatus.className='imstatus';imStatus.textContent=e.data;});
    es.addEventListener('log',function(e){_imLine(e.data);});
    es.addEventListener('done',function(e){_imDone=true;es.close();_imES=null;
      var d={};try{d=JSON.parse(e.data);}catch(_){}
      imStatus.className='imstatus';imStatus.textContent='Done — opening…';
      pushRecent(_imPath);if(d.url)location.href=d.url;});
    es.addEventListener('failed',function(e){_imDone=true;es.close();_imES=null;
      imStatus.className='imstatus err';imStatus.textContent=e.data;_imBusy(false);imCancel.textContent='Close';});
    es.onerror=function(){if(_imDone)return;          // ignore the stream-close after done/failed
      imStatus.className='imstatus err';imStatus.textContent='Connection lost — is the server running?';_imBusy(false);};}
  imRun.onclick=function(){pushRecent(_imPath);closeImport();openPath(_imPath);};   // open in place → hydrates
  imImport.onclick=startImport;
  imCancel.onclick=closeImport;
  imTarget.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();if(!imImport.disabled)startImport();}});
  importBg.addEventListener('mousedown',function(e){if(e.target===importBg)closeImport();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&importBg.classList.contains('show'))closeImport();});
  function render(){var html=items.map(function(c,i){return '<li class="'+(i===sel?'on':'')+'" data-i="'+i+'">'+esc(c)+'</li>';}).join('');
    if(moreTrunc)html+='<li class="more">… more entries — keep typing to filter</li>';
    comp.innerHTML=html;comp.style.display=(items.length||moreTrunc)?'block':'none';}
  function fetchComp(){return fetch('/api/path-complete?q='+encodeURIComponent(inp.value))
    .then(function(r){return r.json();}).then(function(d){items=d.completions||[];moreTrunc=!!d.truncated;sel=-1;render();});}
  function commonPrefix(a){if(!a.length)return '';var p=a[0];for(var k=0;k<a.length;k++){var s=a[k],i=0;
    while(i<p.length&&i<s.length&&p[i]===s[i])i++;p=p.slice(0,i);}return p;}
  // Enter / Open: act on the active suggestion (highlighted, else the first),
  // else on the typed text. Directories are descended (never opened); a new
  // path is confirmed and offered a .jl extension before creating.
  async function submit(){
    var idx = sel>=0?sel:(items.length?0:-1);
    if(idx>=0){var pick=items[idx];inp.value=pick;
      if(isdir(pick)){fetchComp();return;}     // commit dir + show subpaths, don't open
      openMaybeStandalone(pick);return;}       // file suggestion → open (or offer import)
    var p=inp.value.trim(); if(!p)return;
    var info=await fetch('/api/path-info?q='+encodeURIComponent(p)).then(function(r){return r.json();});
    if(info.isdir){if(!isdir(p))inp.value=p+window.PLATFORM.sep;fetchComp();return;} // never open a directory
    if(info.isfile){info.standalone?openImport(p):openPath(p);return;}              // standalone → import helper
    if(!await confirmDark('Create new notebook “'+p+'”?','Create'))return;          // confirm new file
    if(p.slice(-3).toLowerCase()!=='.jl'){ if(await confirmDark('“'+p+'” has no .jl extension. Add it?','Add .jl'))p=p+'.jl'; }
    openPath(p);
  }
  var t;inp.addEventListener('input',function(){clearTimeout(t);t=setTimeout(fetchComp,110);});
  // Completion follows focus: load on focus, hide on blur (small delay so a
  // click on a suggestion lands first).
  inp.addEventListener('focus',function(){fetchComp();});
  inp.addEventListener('blur',function(){setTimeout(function(){comp.style.display='none';},120);});
  inp.addEventListener('keydown',function(e){
    if(e.key==='Tab'){e.preventDefault();
      if(!items.length)return;
      if(e.shiftKey){sel=sel<=0?items.length-1:sel-1;inp.value=items[sel];render();return;}   // ⇧Tab cycles backwards
      if(items.length===1){inp.value=items[0];fetchComp();}
      else{var cp=commonPrefix(items);
        if(cp.length>inp.value.length){inp.value=cp;fetchComp();}
        else{sel=(sel+1)%items.length;inp.value=items[sel];render();}}}
    else if(e.key==='/'||e.key==='\\'){var idx=sel>=0?sel:(items.length?0:-1);   // commit a dir + descend
      if(idx>=0&&isdir(items[idx])){e.preventDefault();inp.value=items[idx];fetchComp();}}
    else if(e.key==='ArrowDown'){e.preventDefault();if(items.length){sel=(sel+1)%items.length;inp.value=items[sel];render();}}
    else if(e.key==='ArrowUp'){e.preventDefault();if(items.length){sel=(sel-1+items.length)%items.length;inp.value=items[sel];render();}}
    else if(e.key==='Enter'){e.preventDefault();submit();}
    else if(e.key==='Escape'){items=[];render();}});
  comp.addEventListener('mousedown',function(e){var li=e.target.closest('li');if(!li||li.classList.contains('more'))return;e.preventDefault();
    var pick=items[+li.dataset.i];inp.value=pick;inp.focus();
    isdir(pick)?fetchComp():openMaybeStandalone(pick);});   // click dir = descend, click file = open/import
  document.getElementById('openbtn').onclick=function(){submit();};
  // Upload a local .jl from the browser (this machine) → the server saves it and we open it via the
  // normal open/import flow (so a self-contained bundle still routes through the import helper).
  document.getElementById('uploadbtn').onclick=function(){document.getElementById('uploadin').click();};
  document.getElementById('uploadin').onchange=function(e){
    var f=e.target.files&&e.target.files[0]; e.target.value=''; if(!f)return;   // reset so the same file re-fires
    var rd=new FileReader();
    rd.onload=function(){
      showLoading('Uploading “'+f.name+'”…');
      fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:f.name,content:String(rd.result)})})
        .then(function(r){return r.ok?r.json():r.text().then(function(t){return Promise.reject(t);});})
        .then(function(d){hideLoading();openMaybeStandalone(d.path);})
        .catch(function(err){hideLoading();alertDark('Upload failed: '+err);});
    };
    rd.onerror=function(){alertDark('Could not read “'+f.name+'”.');};
    rd.readAsText(f);
  };
  // Per-session shutdown buttons (event-delegated over the rows).
  document.addEventListener('click',async function(e){var b=e.target.closest('.kill');if(!b)return;
    var id=b.dataset.id;
    if(!await confirmDark('Shut down session “'+id+'”? Its worker stops and the notebook closes.','Shutdown','danger'))return;
    showLoading('Shutting down “'+id+'”…');
    fetch('/api/'+encodeURIComponent(id)+'/shutdown',{method:'POST'}).then(function(){hideLoading();loadSessions();});});
  // Recently opened notebooks (per-browser, localStorage). Click to open (or jump to it if it's
  // already running — marked with a green ● dot). ✕ forgets an entry.
  var RECENT_KEY='slateRecents';
  function getRecents(){try{return JSON.parse(localStorage.getItem(RECENT_KEY)||'[]');}catch(e){return [];}}
  function saveRecents(a){try{localStorage.setItem(RECENT_KEY,JSON.stringify(a.slice(0,12)));}catch(e){}}
  function pushRecent(p){if(!p)return;var a=getRecents().filter(function(x){return x!==p;});a.unshift(p);saveRecents(a);}
  function forgetRecent(p){saveRecents(getRecents().filter(function(x){return x!==p;}));renderRecents();}
  function openPaths(){var s={};document.querySelectorAll('.nb .p').forEach(function(e){s[e.textContent]=1;});return s;}
  function baseName(p){return window.PLATFORM.baseOf(p.replace(/[\/\\]+$/,''));}
  function renderRecents(){
    var box=document.getElementById('recent'),open=openPaths();
    var list=getRecents();   // show ALL recents — currently-open ones get an "open" dot, not hidden
    box.innerHTML=list.length? '<h2 class="sect">Recent</h2>'+list.map(function(p){
      var isOpen=!!open[p];
      return '<div class="ritem'+(isOpen?' isopen':'')+'" data-p="'+esc(p)+'"><div class="rt"><span class="rb">'+
        esc(baseName(p))+(isOpen?' <span class="rdot" title="currently open">●</span>':'')+
        '</span><span class="rp">'+esc(p)+'</span></div><button class="rx" data-p="'+esc(p)+'" title="remove from recents">✕</button></div>';
    }).join('') : '';
  }
  document.getElementById('recent').addEventListener('click',function(e){
    var x=e.target.closest('.rx'); if(x){e.stopPropagation();forgetRecent(x.dataset.p);return;}
    var it=e.target.closest('.ritem'); if(it)openMaybeStandalone(it.dataset.p);});
  // Open notebooks/sessions — rendered client-side from /api/notebooks.
  function relTime(t){if(!t)return '';var s=Math.max(0,Math.floor(Date.now()/1000)-t);
    if(s<45)return 'just now'; if(s<90)return '1m ago';
    var m=Math.floor(s/60); if(m<60)return m+'m ago';
    var h=Math.floor(m/60); if(h<24)return h+'h ago';
    return Math.floor(h/24)+'d ago';}
  function fmtDur(ms){if(!ms||ms<1)return ''; if(ms<1000)return Math.round(ms)+'ms';
    var s=ms/1000; return (s<10?s.toFixed(1):Math.round(s))+'s';}
  function nbBadges(n){
    var split=(n.code||0)+' code'+(n.md?' · '+n.md+' md':'');
    var b=['<span class="bdg" title="'+n.cells+' cells">'+split+'</span>'];
    if(n.binds)   b.push('<span class="bdg ctrl" title="interactive @bind controls">'+n.binds+' ⊞</span>');
    if(n.running) b.push('<span class="bdg run">'+n.running+' running</span>');
    if(n.stale)   b.push('<span class="bdg stale">'+n.stale+' stale</span>');
    if(n.errors)  b.push('<span class="bdg err">'+n.errors+' error'+(n.errors===1?'':'s')+'</span>');
    return b.join('');
  }
  function nbFoot(n){var p=[];var e=relTime(n.mtime);if(e)p.push('edited '+e);
    var d=fmtDur(n.compute_ms);if(d)p.push('ran '+d);
    return p.length?'<span class="foot">'+p.join('  ·  ')+'</span>':'';}
  function loadSessions(){
    return fetch('/api/notebooks').then(function(r){return r.json();}).then(function(nbs){
      var box=document.getElementById('sessions');
      box.innerHTML = nbs.length ? '<h2 class="sect">Running</h2>'+nbs.map(function(n){
        return '<div class="nb'+(n.errors?' has-err':'')+'"><a class="nbmain" href="/n/'+encodeURIComponent(n.id)+'">'+
          '<span class="nbhead"><span class="t">'+esc(n.title)+'</span>'+
          (n.port?'<span class="wport" title="gate worker port">● :'+n.port+'</span>':'')+'</span>'+
          '<span class="p">'+esc(n.path)+'</span>'+
          '<span class="meta">'+nbBadges(n)+'</span>'+nbFoot(n)+'</a>'+
          '<button class="kill" data-id="'+esc(n.id)+'" title="shut down this session">⨯ shutdown</button></div>';
      }).join('') : '<p class="empty">No notebooks open — open one above.</p>';
      // Remember ANY notebook the server has open — not just ones opened from this page — so a
      // notebook opened via a link, an agent, or an MCP tool still shows up in Recent.
      var rec=getRecents();
      nbs.forEach(function(n){ if(n.path && rec.indexOf(n.path)<0) pushRecent(n.path); });
      renderRecents();   // recents marks (not hides) notebooks already open (reads .nb .p)
    }).catch(function(){});
  }
  // Local export sites (Export → Save to local site), served by the hub at /sites/<name>/ — link each.
  function loadLocalSites(){
    return fetch('/api/sites').then(function(r){return r.json();}).then(function(d){
      var box=document.getElementById('localsites'); if(!box) return;
      var sites=(d&&d.sites)||[];
      box.innerHTML = sites.length ? '<h2 class="sect">Sites</h2><div class="sitecards">'+sites.map(function(s){
        var url='/sites/'+encodeURIComponent(s)+'/';
        return '<a class="sitecard" href="'+esc(url)+'"><span class="si">🌐</span>'+
          '<span class="sn">'+esc(s)+'</span><span class="su">'+esc(url)+'</span></a>';
      }).join('')+'</div>' : '';
    }).catch(function(){});
  }
  // Published documents (the publish ledger): what's been published where, with live URLs / DOIs.
  // Read-only here — configure + publish from a notebook's ☁ Publishing manager.
  function pubLatest(d){ var e=(d.events&&d.events[0])||null; return e||{}; }   // events are newest-first
  function loadPublished(){
    return fetch('/api/publish/ledger').then(function(r){return r.json();}).then(function(v){
      var box=document.getElementById('published'); if(!box) return;
      var docs=(v&&v.documents)||[];
      docs=docs.filter(function(d){return d.events&&d.events.length;});
      box.innerHTML = docs.length ? '<h2 class="sect">Published</h2><div class="sitecards">'+docs.map(function(d){
        var e=pubLatest(d); var url=e.url||''; var doi=e.doi||'';
        var href=url||(doi?('https://doi.org/'+doi):'#');
        return '<a class="sitecard" href="'+esc(href)+'" target="_blank" rel="noopener"><span class="si">'+(doi?'📄':'🌐')+'</span>'+
          '<span class="sn">'+esc(d.title||d.slug)+'</span><span class="su">'+esc(doi?('DOI '+doi):url)+'</span></a>';
      }).join('')+'</div>' : '';
    }).catch(function(){});
  }
  loadSessions(); loadLocalSites(); loadPublished();
  // Keep the Running + Recent lists live: poll while the tab is visible (notebooks open/close
  // from other tabs, agents, or MCP tools), and refresh immediately when the tab regains focus.
  setInterval(function(){ if(!document.hidden){ loadSessions(); loadLocalSites(); } }, 4000);   // not loadPublished — its ledger read can hit the network (gist)
  document.addEventListener('visibilitychange',function(){ if(!document.hidden){ loadSessions(); loadLocalSites(); loadPublished(); } });
  window.addEventListener('pageshow',function(){ loadSessions(); loadLocalSites(); loadPublished(); });   // back/forward cache restore
  // Prefill the last directory we opened from (but DON'T open the completion
  // dropdown on load — it would cover the open-sessions list; it opens when the
  // user types or Tabs).
  try{var last=localStorage.getItem('slateLastDir'); if(last){inp.value=last;}}catch(e){}
})();
</script>
</body></html>
