# Kaimon extension manifest. Register the project path in
# ~/.config/kaimon/extensions.json (or via the Extensions tab) to load it.
[extension]
namespace = "slate"
module = "KaimonSlate"
tools_function = "create_tools"
shutdown_function = "on_shutdown"
# Subscribe to all agent-session channels on the gate event bus (ZMQ prefix match).
# Kaimon's agent service publishes `{kind,turn,data}` events on `agent:<id>`;
# `KaimonSlate.on_event` relays them to the bound notebook's SSE (chat pane).
event_topics = ["agent:"]
description = "KaimonSlate — a warm-session reactive notebook with a live browser UI."
