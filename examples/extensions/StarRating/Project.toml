name = "StarRating"
uuid = "06afbefc-9613-4bb7-bc4a-f7a72d2076db"
authors = ["Kahli Burke <kahli@kahliburke.com>"]
version = "0.1.0"

# A SAMPLE Slate extension package. It depends ONLY on the lean SlateExtensionsBase SDK — NOT on
# KaimonSlate — and adds a typed `@bind` star-rating control end to end: a Julia constructor
# (`to_widget`), a value lifecycle (`register_kind!`), and a front-end renderer (`register_widget_js`
# → `slateRegisterWidget`). This is the proof that a third party can extend Slate without the server.
[deps]
SlateExtensionsBase = "bc31d39e-4442-48fa-b9ae-1bd99fed63f7"

[sources]
SlateExtensionsBase = {path = "../../../lib/SlateExtensionsBase"}

[compat]
SlateExtensionsBase = "0.1"
julia = "1.10"

[extras]
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["Test"]
