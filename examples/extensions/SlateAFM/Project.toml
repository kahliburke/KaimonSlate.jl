name = "SlateAFM"
uuid = "48bdd467-e615-4c42-bca2-e391cca8438c"
authors = ["Kahli Burke <kahli@kahliburke.com>"]
version = "0.1.0"

# A Slate extension that hosts Anywidget Front-end Modules (AFM). Depends ONLY on SlateExtensionsBase —
# it dogfoods provide_frontend! (the host shim), provide_assets! (served modules) and the widget seam to
# run framework-agnostic AFM widgets (anywidget-style) inside a Slate notebook.
[deps]
JSON = "682c06a0-de6a-54ab-a142-c8b1cf79cde6"
SlateExtensionsBase = "bc31d39e-4442-48fa-b9ae-1bd99fed63f7"

[sources]
SlateExtensionsBase = {path = "../../../lib/SlateExtensionsBase"}

[compat]
SlateExtensionsBase = "0.1"
julia = "1.10"

[extras]
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["Test"]
